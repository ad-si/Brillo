resolver: lts-24.39  # ghc-9.10.3, matches the Nix flake
system-ghc: true

allow-newer: true
allow-newer-deps:
  - storable-offset
  - FULE

packages:
  - brillo
  - brillo-algorithms
  - brillo-examples
  - brillo-export
  - brillo-juicy
  - brillo-rendering

ghc-options:
  "$locals": -Wall -Werror -Wunused-matches -Wunused-imports -Wname-shadowing -Wunused-packages

extra-deps:
  - storable-offset-0.1.0.0
  - webp-0.1.2.0
  - FULE-0.3.1.2

  - github: dpwiz/freetype2
    commit: d2acf926b5c448d8edd60e322862adcf2dbe9146
